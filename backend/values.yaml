nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: gitlab.local:5050/root/kim-minji-backend
  tag: "latest"
  pullPolicy: Always

imagePullSecrets:
  - name: gitlab-registry-secret

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: "prod"
  AI_SERVER_URL: "http://kim-minji-ai-serving-ai-serving.ai-serving.svc.cluster.local:8000"

secret:
  name: backend-secret
  keys:
    DB_URL: DB_URL
    DB_USERNAME: DB_USERNAME
    DB_PASSWORD: DB_PASSWORD
    MINIO_ENDPOINT: MINIO_ENDPOINT
    MINIO_ACCESS_KEY: MINIO_ACCESS_KEY
    MINIO_SECRET_KEY: MINIO_SECRET_KEY
    MINIO_BUCKET: MINIO_BUCKET

probes:
  enabled: true
  readiness:
    path: /actuator/health
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    path: /actuator/health
    initialDelaySeconds: 20
    periodSeconds: 20

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
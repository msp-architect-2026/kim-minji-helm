nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: gitlab.local:5050/root/kim-minji-backend
  tag: "latest"
  pullPolicy: Always

imagePullSecrets:
  - name: gitlab-registry-secret

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: "prod"
  AI_SERVER_URL: "http://kim-minji-ai-serving-ai-serving.ai-serving.svc.cluster.local:8000"

secret:
  name: backend-secret
  initialValues:
    DB_URL: "jdbc:mysql://mysql-mysql.storage.svc.cluster.local:3306/appdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    DB_USERNAME: "appuser"
    DB_PASSWORD: "apppass123"
    MINIO_ENDPOINT: "http://minio-minio.storage.svc.cluster.local:9000"
    MINIO_ACCESS_KEY: "minioadmin"
    MINIO_SECRET_KEY: "minioadmin123"
    MINIO_BUCKET: "wafer-image-bucket"

probes:
  enabled: true
  readiness:
    path: /actuator/health
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    path: /actuator/health
    initialDelaySeconds: 20
    periodSeconds: 20

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
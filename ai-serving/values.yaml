nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: gitlab.local:5050/root/kim-minji-ai
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1500m
    memory: 1Gi

env: {}
secretEnv: {}

probes:
  enabled: true
  readiness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 6
  liveness:
    path: /health
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 6

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

nodeSelector:
  kubernetes.io/hostname: k3s-ai2

imagePullSecrets:
  - name: gitlab-registry-secret  